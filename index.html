    <!doctype html>
    <html lang="en">
    <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Enchong Dee University Student ID Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Oswald:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />

    <!-- CDN libs (no npm, no build tools) -->
    <script defer src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script defer src="./app.js"></script>
    </head>

    <body>
    <main class="page">
        <section class="controls">
        <h2>Generate your Student ID</h2>

        <label>
            Full name
            <input id="nameInput" type="text" placeholder="Enter your name" maxlength="40" />
        </label>

        <label>
            Student type
            <select id="typeSelect">
            <option value="Student Yearner" selected>Student Yearner</option>
            <option value="Student Back-Burner">Student Back-Burner</option>
            <option value="Student Relapser">Student Relapser</option>
            </select>
        </label>

        <label>
            Department
            <select id="deptSelect">
            <option value="College of Relapse Engineering (BS Relapse Engineering)" selected>College of Relapse Engineering (BS Relapse Engineering)</option>
            <option value="School of Yearning Architecture (BS EngiYearning)">School of Yearning Architecture (BS EngiYearning)</option>
            <option value="Department of Information Heart-Technology (BS Heart-IT)">Department of Information Heart-Technology (BS Heart-IT)</option>
            <option value="School of Rebound Logistics (BS Rebound Management)">School of Rebound Logistics (BS Rebound Management)</option>
            <option value="Institute of Back-Burner Science (BS Back-Burner Studies)">Institute of Back-Burner Science (BS Back-Burner Studies)</option>
            <option value="School of Delusional Science (BS Delulu Manifestation)">School of Delusional Science (BS Delulu Manifestation)</option>
            <option value="College of Situationship Arts (BA Situationship Dynamics)">College of Situationship Arts (BA Situationship Dynamics)</option>
            <option value="Department of Digital Ghosting (BS Ghosting &amp; Evasion)">Department of Digital Ghosting (BS Ghosting &amp; Evasion)</option>
            <option value="Faculty of Bitter-Sweetness (BA Revenge Studies)">Faculty of Bitter-Sweetness (BA Revenge Studies)</option>
            <option value="School of Platonic Engineering (BS Friendzone Management)">School of Platonic Engineering (BS Friendzone Management)</option>
            <option value="Institute of Signal Cryptography (BS Mixed Signal Analysis)">Institute of Signal Cryptography (BS Mixed Signal Analysis)</option>
            </select>
        </label>

        <label>
            Course
            <select id="courseSelect"></select>
        </label>

        <label>
            Social media
            <select id="socialSelect">
            <option value="tiktok" selected>TikTok</option>
            <option value="instagram">Instagram</option>
            <option value="facebook">Facebook</option>
          <option value="threads">Threads</option>
            <option value="x">X</option>
            </select>
        </label>

        <label>
            Username (for QR)
            <div class="igRow">
            <span class="igPrefix">@</span>
            <input id="socialUserInput" type="text" placeholder="yourusername" maxlength="30" />
            </div>
        </label>

        <label>
            Upload photo
            <input id="photoInput" type="file" accept="image/*" />
        </label>

    <label>
        Quote language
        <select id="quoteLangSelect" class="quoteSelect">
        <option value="en" selected>English</option>
        <option value="tl">Tagalog</option>
        </select>
    </label>

        <div class="btnRow">
            <button id="newIdBtn" type="button">Generate new Student ID</button>
            <button id="quoteBtn" type="button">New yearning quote</button>
            <button id="downloadBtn" type="button">Download ID</button>
        </div>
        </section>

        <section class="preview">
        <div class="idCard" id="idCard">
            <div class="header">
            <img class="headerCrest" src="./Image/EDULOGO_WHITE.png" alt="EDU crest" />
            <div class="schoolName">ENCHONG DEE UNIVERSITY</div>
            </div>

            <div class="body">
            <div class="left">
                <div class="photoFrame">
                <img id="photoPreview" alt="Student photo" />
                </div>
                <div class="nameBelowPhoto" id="nameOut">—</div>
                <div class="roleBadge" id="roleBadge">STUDENT YEARNER</div>
                <div class="validBox">
                <div class="validLine"><span class="validLabel">VALID UNTIL:</span><span class="validValue">LIFETIME</span></div>
                </div>
            </div>

            <div class="right">
                <div class="titleRow">
                <div class="title">
                    <div class="cardTitleTop">STUDENT</div>
                    <div class="cardTitleMid">IDENTIFICATION</div>
                    <div class="cardTitleBot">CARD</div>
                </div>
                <div class="logoCircle" aria-label="EDU logo">
                    <img class="logoImg" src="./Image/EDULOGO_BLUE.png" alt="EDU logo" />
                </div>
                </div>

                <div class="fields">
                <div class="field"><span class="k">STUDENT ID</span><span class="c">:</span><span class="v" id="idOut">—</span></div>
                <div class="field"><span class="k">DEPARTMENT</span><span class="c">:</span><span class="v" id="deptOut">Yearning</span></div>
                <div class="field"><span class="k">COURSE</span><span class="c">:</span><span class="v" id="courseOut">—</span></div>
                </div>

                <div class="codes">
                <div class="qrWrap">
                    <div class="qrBox">
                    <div id="qr"></div>
                  <div id="qrCenterBadge" class="qrCenterBadge" aria-hidden="true">
                    <img id="qrBadgeImg" class="qrBadgeImg" alt="" />
                  </div>
                    </div>
                    <div class="codeLabel" id="qrLabel">SOCIAL QR</div>
                </div>

                <div class="barWrap">
                    <svg id="barcode"></svg>
                    <div class="codeValue" id="barcodeValue">—</div>
                </div>
                </div>
            </div>
            </div>

            <div class="quote">
            <span id="quoteOut">The right train arrives when you’re ready to board.</span>
            </div>
        </div>
        </section>
    </main>
    </body>
    </html>
